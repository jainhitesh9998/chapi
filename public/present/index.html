<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Career Passport</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #f5f6f8; margin: 0; }
    main { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; }
    h1 { font-size: 22px; color: #111827; margin-bottom: 8px; }
    p { color: #555; max-width: 320px; margin-top: 2px; }
    a.btn { display: inline-block; margin-top: 20px; background: #2563eb; color: #fff; border-radius: 999px; padding: 12px 24px; font-size: 15px; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <h1 id="title">Opening Career Passport…</h1>
    <p id="subtitle">Preparing your request…</p>
    <div id="continueWrap" style="display:none">
      <a id="continueLink" class="btn" href="#" target="_top">Continue</a>
    </div>
  </main>

  <script src="https://unpkg.com/web-credential-handler@2/dist/web-credential-handler.min.js"></script>
  <script>
    // The Continue link always points at a Universal Link
    // (LAUNCH_ORIGIN + /launch?u=<raw target>), domain-bound via the app's
    // com.apple.developer.associated-domains entitlement + an
    // apple-app-site-association hosted on this origin — a competing wallet
    // cannot claim someone else's domain, unlike a custom URL scheme. If the
    // OS doesn't intercept it (app not installed, Associated Domains not
    // verified yet, or no App Links equivalent configured for the platform),
    // the browser actually navigates to /launch, which drives the
    // careerpassport-infy-*/careerpassport-interaction: custom-scheme
    // fallback from there (see public/launch/index.html) — this page has no
    // fallback logic of its own; see chapiDeepLink.ts for that mirror.
    var LAUNCH_ORIGIN = 'https://chapi.careerspassports.com';
    var RECOGNIZED_SCHEMES = ['openid4vp://', 'mdoc-openid4vp://', 'openid-credential-offer://'];

    // Raw (un-rewritten) target for an entry, or null if this page doesn't
    // know how to hand it off. For vcapi this is the bare exchange/discovery
    // URL; for the others it's the untouched openid4vp:// etc. deep link.
    function rawTargetFor(entry) {
      if (entry.kind === 'vcapi') {
        if (typeof entry.url !== 'string') return null;
        var trimmed = entry.url.trim();
        return /^https?:\/\//i.test(trimmed) ? trimmed : null;
      }
      if (typeof entry.url !== 'string') return null;
      var lower = entry.url.toLowerCase();
      for (var i = 0; i < RECOGNIZED_SCHEMES.length; i++) {
        if (lower.indexOf(RECOGNIZED_SCHEMES[i]) === 0) return entry.url;
      }
      return null;
    }

    function universalLink(rawUrl) {
      var u = new URL(LAUNCH_ORIGIN + '/launch');
      u.searchParams.set('u', rawUrl);
      return u.toString();
    }

    function extractProtocols(event) {
      return (event && event.credentialRequestOptions && event.credentialRequestOptions.web && event.credentialRequestOptions.web.protocols)
        || (event && event.credentialRequestOptions && event.credentialRequestOptions.protocols)
        || (event && event.protocols)
        || (event && event.credential && event.credential.options && event.credential.options.web && event.credential.options.web.protocols)
        || (event && event.credential && event.credential.options && event.credential.options.protocols);
    }

    function protocolList(protocols) {
      if (!protocols) return [];
      var list = [];
      if (protocols.OID4VP) list.push({kind: 'OID4VP', url: protocols.OID4VP});
      if (protocols.OID4VCI) list.push({kind: 'OID4VCI', url: protocols.OID4VCI});
      if (protocols.vcapi) list.push({kind: 'vcapi', url: protocols.vcapi});
      return list;
    }

    var titleEl = document.getElementById('title');
    var subtitleEl = document.getElementById('subtitle');
    var continueWrap = document.getElementById('continueWrap');
    var continueLink = document.getElementById('continueLink');
    var respondWith = null;
    var responded = false;

    function respondOutOfBand() {
      if (responded) return;
      responded = true;
      if (respondWith) respondWith(Promise.resolve({dataType: 'OutOfBand', data: null}));
    }

    continueLink.addEventListener('click', function () {
      titleEl.textContent = 'Opening Career Passport…';
      subtitleEl.textContent = "If the app didn't open, tap the button again.";
      // Whether the OS intercepts the Universal Link (app opens directly) or
      // not (browser navigates to /launch for real, which drives the
      // custom-scheme fallback from there), the interaction proceeds outside
      // this page either way. iOS decides synchronously at tap time, before
      // any network activity, so there's no reliable "did it open" signal
      // left to wait for here — just respond immediately.
      respondOutOfBand();
    });

    WebCredentialHandler.receiveCredentialEvent()
      .then(function (event) {
        respondWith = event.respondWith;
        var protocols = protocolList(extractProtocols(event));
        console.log('[CHAPI present] available protocols:', protocols.map(function (p) { return p.kind; }));
        if (protocols.length === 0) {
          titleEl.textContent = 'Unsupported request';
          subtitleEl.textContent = 'Career Passport handles OID4VP, OID4VCI, and VC-API, but this request offered none.';
          respondOutOfBand();
          return;
        }
        var chosen = null;
        for (var i = 0; i < protocols.length; i++) {
          var raw = rawTargetFor(protocols[i]);
          if (raw) {
            chosen = {protocol: protocols[i], primary: universalLink(raw)};
            break;
          }
        }
        if (!chosen) {
          titleEl.textContent = 'Unsupported request';
          subtitleEl.textContent = "This request's endpoints are not URLs Career Passport can open.";
          respondOutOfBand();
          return;
        }
        console.log('[CHAPI present] chosen protocol:', chosen.protocol.kind);
        titleEl.textContent = 'Review in Career Passport';
        subtitleEl.textContent = 'Open the app to review this request before anything is added or shared.';
        continueLink.href = chosen.primary;
        continueWrap.style.display = 'block';
      })
      .catch(function (err) {
        console.error('Failed to receive CHAPI event', err);
        titleEl.textContent = 'Could not receive the request';
        subtitleEl.textContent = String(err && err.message ? err.message : err);
      });
  </script>
</body>
</html>
